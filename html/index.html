<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

<div class="container">
    <form  action="#" method="POST" class="form-card">
        <h2 class="form-title">Login</h2>

        <div class="form-group">
            <label class="form-label">User Name</label>
            <input class="form-input username" type="text" name="username" id="username" placeholder="Enter your name" required>
            <i class="bx bxs-user user"></i>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <i class="bx bxs-lock lock"></i>
            <input class="form-input password" type="password" name="clave" id="clave" placeholder="Enter your password" required>
            <i class="bx bxs-hide eye"></i>
        </div>

        <p class="form-hint-text"></p>

        <button class="form-button" type="submit">Login</button>

        <a href="#" class="form-link">Forgot your password?</a>
    </form>
</div>
</body>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
<link rel="stylesheet" href="../css/style.css">
<script type="text/javascript" src="../js/script.js"></script>
<script type="text/javascript" src="../js/LoginValidator.js"></script>
</html>
